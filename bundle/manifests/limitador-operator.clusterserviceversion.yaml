apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "limitador.kuadrant.io/v1alpha1",
          "kind": "Limitador",
          "metadata": {
            "name": "limitador-sample"
          },
          "spec": {
            "limits": [
              {
                "conditions": [
                  "get_toy == 'yes'"
                ],
                "max_value": 2,
                "name": "toy_get_route",
                "namespace": "toystore-app",
                "seconds": 30,
                "variables": []
              }
            ],
            "listener": {
              "grpc": {
                "port": 8081
              },
              "http": {
                "port": 8080
              }
            }
          }
        }
      ]
    capabilities: Basic Install
    categories: Integration & Delivery
    containerImage: registry.redhat.io/rhcl-1/limitador-rhel9-operator@sha256:6092c510b04a4cee253a52c07b77b625e90d863fa9ccd8727eb901bd81b4e071
    createdAt: "2026-02-04T12:54:29Z"
    description: The Limitador operator installs and maintains limitador instances
    operators.operatorframework.io/builder: operator-sdk-v1.32.0
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v3
    repository: https://github.com/Kuadrant/limitador-operator
    support: kuadrant
    features.operators.openshift.io/disconnected: "true"
    features.operators.openshift.io/fips-compliant: "false"
    features.operators.openshift.io/proxy-aware: "false"
    features.operators.openshift.io/tls-profiles: "false"
    features.operators.openshift.io/token-auth-aws: "false"
    features.operators.openshift.io/token-auth-azure: "false"
    features.operators.openshift.io/token-auth-gcp: "false"
    features.operators.openshift.io/cnf: "false"
    features.operators.openshift.io/cni: "false"
    features.operators.openshift.io/csi: "false"
    operators.openshift.io/valid-subscription: '["Red Hat Connectivity Link"]'
  name: limitador-operator.v0.17.0
  namespace: placeholder
  labels:
    operatorframework.io/os.linux: supported
    operatorframework.io/arch.amd64: supported
    operatorframework.io/arch.arm64: supported
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
      - description: Limitador is the Schema for the limitadors API
        displayName: Limitador
        kind: Limitador
        name: limitadors.limitador.kuadrant.io
        version: v1alpha1
  description: Enables rate limiting for Gateways and applications in a Gateway API network. Part of Red Hat Connectivity Link
  displayName: Limitador Operator
  icon:
    - base64data: 
      mediatype: image/png
  install:
    spec:
      clusterPermissions:
        - rules:
            - apiGroups:
                - ""
              resources:
                - configmaps
                - persistentvolumeclaims
                - secrets
                - services
              verbs:
                - create
                - delete
                - get
                - list
                - patch
                - update
                - watch
            - apiGroups:
                - ""
              resources:
                - pods
              verbs:
                - list
                - patch
                - update
                - watch
            - apiGroups:
                - apps
              resources:
                - deployments
              verbs:
                - create
                - delete
                - get
                - list
                - patch
                - update
                - watch
            - apiGroups:
                - limitador.kuadrant.io
              resources:
                - limitadors
              verbs:
                - create
                - delete
                - get
                - list
                - patch
                - update
                - watch
            - apiGroups:
                - limitador.kuadrant.io
              resources:
                - limitadors/finalizers
              verbs:
                - update
            - apiGroups:
                - limitador.kuadrant.io
              resources:
                - limitadors/status
              verbs:
                - get
                - patch
                - update
            - apiGroups:
                - policy
              resources:
                - poddisruptionbudgets
              verbs:
                - create
                - delete
                - get
                - list
                - patch
                - update
                - watch
          serviceAccountName: limitador-operator-controller-manager
      deployments:
        - label:
            control-plane: controller-manager
          name: limitador-operator-controller-manager
          spec:
            replicas: 1
            selector:
              matchLabels:
                control-plane: controller-manager
            strategy: {}
            template:
              metadata:
                labels:
                  app: limitador-operator
                  control-plane: controller-manager
              spec:
                containers:
                  - args:
                      - --leader-elect
                    command:
                      - /manager
                    env:
                      - name: RELATED_IMAGE_LIMITADOR
                        value: registry.redhat.io/rhcl-1/limitador-rhel9@sha256:aff28d76f9cfeefafd6b652e055bb25e1a2bf250e062e3e9b5e54db873f9eeb7
                    image: registry.redhat.io/rhcl-1/limitador-rhel9-operator@sha256:6092c510b04a4cee253a52c07b77b625e90d863fa9ccd8727eb901bd81b4e071
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: 8081
                      initialDelaySeconds: 15
                      periodSeconds: 20
                    name: manager
                    ports:
                      - containerPort: 8080
                        name: metrics
                    readinessProbe:
                      httpGet:
                        path: /readyz
                        port: 8081
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    resources:
                      limits:
                        cpu: 200m
                        memory: 300Mi
                      requests:
                        cpu: 200m
                        memory: 200Mi
                    securityContext:
                      allowPrivilegeEscalation: false
                securityContext:
                  runAsNonRoot: true
                serviceAccountName: limitador-operator-controller-manager
                terminationGracePeriodSeconds: 10
      permissions:
        - rules:
            - apiGroups:
                - ""
                - coordination.k8s.io
              resources:
                - configmaps
                - leases
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
            - apiGroups:
                - ""
              resources:
                - events
              verbs:
                - create
                - patch
          serviceAccountName: limitador-operator-controller-manager
    strategy: deployment
  installModes:
    - supported: false
      type: OwnNamespace
    - supported: false
      type: SingleNamespace
    - supported: false
      type: MultiNamespace
    - supported: true
      type: AllNamespaces
  keywords:
    - api
    - rate-limit
    - kuadrant
  links:
    - name: Limitador Operator
      url: https://github.com/Kuadrant/limitador-operator
    - name: Kuadrant Docs
      url: https://kuadrant.io
  maintainers:
    - email: eastizle@redhat.com
      name: Eguzki Astiz Lezaun
    - email: asnaps@redhat.com
      name: Alex Snaps
    - email: didier@redhat.com
      name: Didier Di Cesare
  maturity: alpha
  minKubeVersion: 1.25.0
  provider:
    name: Red Hat
    url: https://github.com/Kuadrant/limitador-operator
  relatedImages:
    - image: registry.redhat.io/rhcl-1/limitador-rhel9@sha256:aff28d76f9cfeefafd6b652e055bb25e1a2bf250e062e3e9b5e54db873f9eeb7
      name: limitador
  version: 0.17.0
