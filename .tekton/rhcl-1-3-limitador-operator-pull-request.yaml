apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/rh-api-management/limitador-operator-product-build?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "true"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "pull_request" && target_branch == "rhcl-1.3" && ( "limitador-operator/*".pathChanged() || "Containerfile.limitador-operator".pathChanged() || "rpms.lock.yaml".pathChanged() || "config/".pathChanged() || ".tekton/rhcl-1-3-limitador-operator-pull-request.yaml".pathChanged() || ".tekton/multi-arch-build-pipeline.yaml".pathChanged() )
  creationTimestamp: null
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: rhcl-1-3-limitador-operator
    appstudio.openshift.io/component: rhcl-1-3-limitador-operator
    pipelines.appstudio.openshift.io/type: build
  name: rhcl-1-3-limitador-operator-on-pull-request
  namespace: api-management-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/redhat-user-workloads/api-management-tenant/rhcl-1-3-limitador-operator:on-pr-{{revision}}
  - name: image-expires-after
    value: 5d
  - name: dockerfile
    value: Containerfile.limitador-operator
  - name: prefetch-input
    value: '[{"type": "rpm", "path": "."}, {"type": "gomod", "path": "./limitador-operator"}, {"type": "pip", "path": "."}]'
  pipelineRef:
    name: build-pipeline
  taskRunTemplate:
    serviceAccountName: build-pipeline-rhcl-1-3-limitador-operator
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}