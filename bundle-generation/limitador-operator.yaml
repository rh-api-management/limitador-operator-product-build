# Limitador Operator Bundle Configuration
# This file contains all RHCL-specific strings and configuration values
# that are injected into the bundle during generation.

# CSV metadata
csv:
  name: limitador-operator.v1.2.0
  version: "1.2.0"
  displayName: Limitador Operator
  description: "The Limitador operator installs and maintains limitador instances for Red Hat Connectivity Link."
  icon:
    - base64data: 
      mediatype: image/png

# OLM channel configuration
channel: stable

# Documentation and support links
links:
  documentation: https://docs.redhat.com/en/documentation/red_hat_connectivity_link
  repository: https://github.com/Kuadrant/limitador-operator

# Valid subscription for marketplace
validSubscription: Red Hat Connectivity Link

# OpenShift operator feature annotations
features:
  disconnected: "true"
  fips-compliant: "false"
  proxy-aware: "false"
  tls-profiles: "false"
  token-auth-aws: "false"
  token-auth-azure: "false"
  token-auth-gcp: "false"
  cnf: "false"
  cni: "false"
  csi: "false"

# Architecture support labels
architectures:
  amd64: supported
  arm64: supported
  os.linux: supported

# Registry mappings for each environment
# SHAs are extracted from the dev images in image-pullspecs.yaml
registries:
  dev:
    # Uses images directly from image-pullspecs.yaml
    operator: null
    limitador: null
  stage:
    operator: registry.stage.redhat.io/rhcl-1/limitador-rhel9-operator
    limitador: registry.stage.redhat.io/rhcl-1/limitador-rhel9
  prod:
    operator: registry.redhat.io/rhcl-1/limitador-rhel9-operator
    limitador: registry.redhat.io/rhcl-1/limitador-rhel9

# Output directory mapping
outputDirs:
  dev: bundle-dev
  stage: bundle-stage
  prod: bundle
